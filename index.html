<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>picoConverter</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fafafa;
  text-align:center;
  padding:20px;
  color:#333;
}

/* タブ */
.tabs{
  display:flex;
  max-width:400px;
  margin:0 auto 15px;
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(255,182,193,0.15);
}

.tab{
  flex:1;
  padding:12px;
  cursor:pointer;
}

.tab.active{
  background:#ff8fab;
  color:white;
}

/* カード */
.card{
  background:white;
  max-width:400px;
  margin:10px auto;
  padding:18px;
  border-radius:16px;
  box-shadow:0 4px 12px rgba(255,182,193,0.15);
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff8fab;
  color:white;
}

button:active{
  transform:scale(0.97);
}

input{
  margin-top:10px;
}

#preview img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<h2>picoConverter</h2>

<!-- タブ -->
<div class="tabs">
  <div class="tab active" onclick="showTab('pdf')">PDF→画像</div>
  <div class="tab" onclick="showTab('img')">画像→PDF</div>
</div>

<!-- PDF → 画像 -->
<div id="pdfTab">

  <div class="card">

    <h3>PDF → 画像</h3>

    <input type="file" id="pdfFile" accept="application/pdf">

    <button id="convertPdf">変換</button>
    <button id="dlImg">画像保存</button>
    <button id="zipImg">ZIP保存</button>

  </div>

</div>

<!-- 画像 → PDF -->
<div id="imgTab" style="display:none;">

  <div class="card">

    <h3>画像 → PDF</h3>

    <input type="file" id="imgFile" accept="image/*" multiple>

    <button id="convertImg">PDFにする</button>

  </div>

</div>

<!-- プレビュー -->
<div class="card">
  <h3>プレビュー</h3>
  <div id="preview"></div>
</div>

<!-- ライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let images=[];
const preview=document.getElementById("preview");

/* =====================
   タブ切替
===================== */
function showTab(tab){

  document.getElementById("pdfTab").style.display = tab==="pdf"?"block":"none";
  document.getElementById("imgTab").style.display = tab==="img"?"block":"none";

  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", i === (tab==="pdf"?0:1));
  });
}

/* =====================
   PDF → 画像
===================== */
document.getElementById("convertPdf").onclick = async ()=>{

  const file=document.getElementById("pdfFile").files[0];
  if(!file) return alert("PDFを選んでください");

  images=[];
  preview.innerHTML="";

  const buffer=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buffer}).promise;

  for(let i=1;i<=pdf.numPages;i++){

    const page=await pdf.getPage(i);
    const viewport=page.getViewport({scale:2});

    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");

    canvas.width=viewport.width;
    canvas.height=viewport.height;

    await page.render({canvasContext:ctx,viewport}).promise;

    const img=canvas.toDataURL("image/jpeg");

    images.push(img);

    const el=document.createElement("img");
    el.src=img;
    preview.appendChild(el);
  }
};

/* =====================
   画像保存（iPhone/PC対応）
===================== */
async function saveFile(dataUrl, filename){

  const res=await fetch(dataUrl);
  const blob=await res.blob();
  const file=new File([blob],filename,{type:blob.type});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({files:[file],title:filename});
    return;
  }

  const a=document.createElement("a");
  a.href=dataUrl;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* =====================
   画像DL
===================== */
document.getElementById("dlImg").onclick=()=>{

  if(!images.length) return alert("先に変換してください");

  images.forEach((img,i)=>{
    saveFile(img,`page-${i+1}.jpg`);
  });
};

/* =====================
   ZIP DL
===================== */
document.getElementById("zipImg").onclick=async()=>{

  if(!images.length) return alert("先に変換してください");

  const zip=new JSZip();

  images.forEach((img,i)=>{
    zip.file(`page-${i+1}.jpg`,img.split(",")[1],{base64:true});
  });

  const blob=await zip.generateAsync({type:"blob"});

  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="images.zip";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
};

/* =====================
   画像 → PDF
===================== */
document.getElementById("convertImg").onclick=async()=>{

  const files=document.getElementById("imgFile").files;
  if(!files.length) return alert("画像を選んでください");

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  for(let i=0;i<files.length;i++){

    const data=await new Promise(r=>{
      const f=new FileReader();
      f.onload=e=>r(e.target.result);
      f.readAsDataURL(files[i]);
    });

    const img=new Image();
    img.src=data;

    await new Promise(r=>img.onload=r);

    const w=pdf.internal.pageSize.getWidth();
    const h=(img.height/img.width)*w;

    if(i!==0) pdf.addPage();

    pdf.addImage(img,"JPEG",0,0,w,h);
  }

  pdf.save("images.pdf");
};

</script>

</body>
</html>
