<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>picoConverter</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fafafa;
  text-align:center;
  padding:20px;
  color:#333;
}

.card{
  background:white;
  max-width:400px;
  margin:10px auto;
  padding:18px;
  border-radius:16px;
  box-shadow:0 4px 12px rgba(255,182,193,0.15);
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff8fab;
  color:white;
}

button:active{
  transform:scale(0.97);
}

input{
  margin-top:10px;
}

#preview img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<h2>picoConverter</h2>

<div class="card">
  <h3>PDF → 画像</h3>

  <input type="file" id="pdfFile" accept="application/pdf">

  <button id="convertBtn">変換</button>
  <button id="downloadBtn">ダウンロード</button>
  <button id="zipBtn">ZIPダウンロード</button>
</div>

<div class="card">
  <h3>プレビュー</h3>
  <div id="preview"></div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>
/* =====================
   ★重要：worker設定（これで死ぬバグ防止）
===================== */
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let images = [];

/* =====================
   変換
===================== */
document.getElementById("convertBtn").onclick = async () => {

  const file = document.getElementById("pdfFile").files[0];
  const preview = document.getElementById("preview");

  if (!file) {
    alert("PDFを選んでください");
    return;
  }

  try {

    images = [];
    preview.innerHTML = "";

    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    for (let i = 1; i <= pdf.numPages; i++) {

      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({ canvasContext: ctx, viewport }).promise;

      const img = canvas.toDataURL("image/jpeg");

      images.push(img);

      const el = document.createElement("img");
      el.src = img;
      preview.appendChild(el);
    }

  } catch (e) {
    alert("変換に失敗しました");
    console.log(e);
  }
};

/* =====================
   通常ダウンロード
===================== */
document.getElementById("downloadBtn").onclick = () => {

  if (!images.length) {
    alert("先に変換してください");
    return;
  }

  images.forEach((img, i) => {

    const a = document.createElement("a");
    a.href = img;
    a.download = `page-${i + 1}.jpg`;

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
};

/* =====================
   ZIPダウンロード
===================== */
document.getElementById("zipBtn").onclick = async () => {

  if (!images.length) {
    alert("先に変換してください");
    return;
  }

  const zip = new JSZip();

  images.forEach((img, i) => {
    zip.file(`page-${i + 1}.jpg`, img.split(",")[1], { base64: true });
  });

  const blob = await zip.generateAsync({ type: "blob" });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "images.zip";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
};
</script>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</body>
</html>
