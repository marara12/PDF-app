<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>picoConverter</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fafafa;
  text-align:center;
  padding:20px;
  color:#333;
}

.card{
  background:white;
  max-width:400px;
  margin:10px auto;
  padding:18px;
  border-radius:16px;
  box-shadow:0 4px 12px rgba(255,182,193,0.15);
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff8fab;
  color:white;
}

button:active{
  transform:scale(0.97);
}

#preview img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<h2>picoConverter</h2>

<div class="card">

  <h3>PDF → 画像</h3>

  <input type="file" id="file" accept="application/pdf">

  <button id="convert">変換</button>
  <button id="download">画像保存</button>
  <button id="zip">ZIP保存</button>

</div>

<div class="card">
  <h3>プレビュー</h3>
  <div id="preview"></div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

/* =====================
   worker設定（超重要）
===================== */
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let images=[];
const preview=document.getElementById("preview");

/* =====================
   PDF → 画像
===================== */
document.getElementById("convert").onclick = async ()=>{

  const file=document.getElementById("file").files[0];
  if(!file) return alert("PDFを選んでください");

  images=[];
  preview.innerHTML="";

  const buffer=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buffer}).promise;

  for(let i=1;i<=pdf.numPages;i++){

    const page=await pdf.getPage(i);
    const viewport=page.getViewport({scale:2});

    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");

    canvas.width=viewport.width;
    canvas.height=viewport.height;

    await page.render({canvasContext:ctx,viewport}).promise;

    const img=canvas.toDataURL("image/jpeg");

    images.push(img);

    const el=document.createElement("img");
    el.src=img;
    preview.appendChild(el);
  }
};

/* =====================
   共通保存関数
   （iPhone＝共有 / PC＝DL）
===================== */
async function saveFile(dataUrl, filename){

  const res = await fetch(dataUrl);
  const blob = await res.blob();
  const file = new File([blob], filename, { type: blob.type });

  // iPhone対応（共有）
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({
      files: [file],
      title: filename
    });
    return;
  }

  // PC fallback（ダウンロード）
  const a=document.createElement("a");
  a.href=dataUrl;
  a.download=filename;

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* =====================
   画像保存
===================== */
document.getElementById("download").onclick = ()=>{

  if(!images.length) return alert("先に変換してください");

  images.forEach((img,i)=>{
    saveFile(img,`page-${i+1}.jpg`);
  });
};

/* =====================
   ZIP保存（PC向け）
===================== */
document.getElementById("zip").onclick = async ()=>{

  if(!images.length) return alert("先に変換してください");

  const zip=new JSZip();

  images.forEach((img,i)=>{
    zip.file(`page-${i+1}.jpg`, img.split(",")[1], {base64:true});
  });

  const blob=await zip.generateAsync({type:"blob"});

  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="images.zip";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
};

</script>

</body>
</html>
