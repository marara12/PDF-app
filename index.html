<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>picoConverter</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fafafa;
  text-align:center;
  padding:20px;
  color:#333;
}

.tabs{
  display:flex;
  max-width:420px;
  margin:0 auto 15px;
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(255,182,193,0.15);
}

.tab{
  flex:1;
  padding:12px;
  cursor:pointer;
}

.tab.active{
  background:#ff8fab;
  color:white;
}

.card{
  background:white;
  max-width:420px;
  margin:10px auto;
  padding:18px;
  border-radius:16px;
  box-shadow:0 4px 12px rgba(255,182,193,0.15);
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff8fab;
  color:white;
}

button:active{
  transform:scale(0.97);
}

#preview img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

.notice{
  font-size:12px;
  color:#777;
  margin-top:6px;
}
</style>

</head>

<body>

<h2>picoConverter</h2>

<!-- гВњгГЦ -->
<div class="tabs">
  <div class="tab active" onclick="showTab('pdf')">PDFвЖТзФїеГП</div>
  <div class="tab" onclick="showTab('img')">зФїеГПвЖТPDF</div>
</div>

<!-- PDFвЖТзФїеГП -->
<div id="pdfTab">

  <div class="card">

    <h3>PDF вЖТ зФїеГП</h3>

    <input type="file" id="pdfFile" accept="application/pdf">

    <button id="convertPdf">е§ЙжПЫ</button>
    <button id="downloadPdfImgs">зФїеГПдњЭе≠Ш</button>

    <p class="notice" id="pdfMsg">PDFгВТйБЄжКЮгБЧгБ¶гБПгБ†гБХгБД</p>

  </div>

</div>

<!-- зФїеГПвЖТPDF -->
<div id="imgTab" style="display:none;">

  <div class="card">

    <h3>зФїеГП вЖТ PDF</h3>

    <input type="file" id="imgFile" accept="image/*" multiple>

    <button id="convertImg">PDFгБЂгБЩгВЛ</button>

    <p class="notice">PDFгБѓгГХгВ°гВ§гГЂгВҐгГЧгГ™гБЂдњЭе≠ШгБХгВМгБЊгБЩ</p>

  </div>

</div>

<!-- гГЧгГђгГУгГ•гГЉ -->
<div class="card">
  <h3>гГЧгГђгГУгГ•гГЉ</h3>
  <div id="preview"></div>
</div>

<!-- гГ©гВ§гГЦгГ©гГ™ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let images=[];
const preview=document.getElementById("preview");
const pdfMsg=document.getElementById("pdfMsg");

/* =====================
   гВњгГЦ
===================== */
function showTab(tab){

  document.getElementById("pdfTab").style.display = tab==="pdf"?"block":"none";
  document.getElementById("imgTab").style.display = tab==="img"?"block":"none";

  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", i === (tab==="pdf"?0:1));
  });
}

/* =====================
   PDF вЖТ зФїеГПпЉИдњЃж≠£зЙИпЉЙ
===================== */
document.getElementById("convertPdf").onclick = async ()=>{

  const file=document.getElementById("pdfFile").files[0];

  if(!file){
    alert("PDFгВТйБЄгВУгБІгБПгБ†гБХгБД");
    return;
  }

  try{

    images=[];
    preview.innerHTML="";
    pdfMsg.textContent="е§ЙжПЫдЄ≠вА¶";

    const buffer=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buffer}).promise;

    for(let i=1;i<=pdf.numPages;i++){

      const page=await pdf.getPage(i);
      const viewport=page.getViewport({scale:2});

      const canvas=document.createElement("canvas");
      const ctx=canvas.getContext("2d");

      canvas.width=viewport.width;
      canvas.height=viewport.height;

      await page.render({canvasContext:ctx,viewport}).promise;

      const img=canvas.toDataURL("image/jpeg");

      images.push(img);

      const el=document.createElement("img");
      el.src=img;
      preview.appendChild(el);
    }

    pdfMsg.textContent="е§ЙжПЫеЃМдЇЖ вЬФ гГЧгГђгГУгГ•гГЉи°®з§ЇдЄ≠";

  }catch(e){
    console.log(e);
    pdfMsg.textContent="е§ЙжПЫгБЂе§±жХЧгБЧгБЊгБЧгБЯ";
  }
};

/* =====================
   зФїеГПдњЭе≠ШпЉИiPhoneеѓЊењЬпЉЙ
===================== */
document.getElementById("downloadPdfImgs").onclick = ()=>{

  if(!images.length){
    alert("еЕИгБЂе§ЙжПЫгБЧгБ¶гБПгБ†гБХгБД");
    return;
  }

  images.forEach((img,i)=>{

    const a=document.createElement("a");
    a.href=img;
    a.download=`page-${i+1}.jpg`;

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  pdfMsg.textContent="дњЭе≠ШгГАгВ§гВҐгГ≠гВ∞гВТйЦЛгБНгБЊгБЧгБЯпЉИгГХгВ°гВ§гГЂгВҐгГЧгГ™гБЂдњЭе≠ШеПѓиГљпЉЙ";
};

/* =====================
   зФїеГП вЖТ PDF
===================== */
document.getElementById("convertImg").onclick=async()=>{

  const files=document.getElementById("imgFile").files;

  if(!files.length){
    alert("зФїеГПгВТйБЄгВУгБІгБПгБ†гБХгБД");
    return;
  }

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  for(let i=0;i<files.length;i++){

    const data=await new Promise(r=>{
      const f=new FileReader();
      f.onload=e=>r(e.target.result);
      f.readAsDataURL(files[i]);
    });

    const img=new Image();
    img.src=data;

    await new Promise(r=>img.onload=r);

    const w=pdf.internal.pageSize.getWidth();
    const h=(img.height/img.width)*w;

    if(i!==0) pdf.addPage();

    pdf.addImage(img,"JPEG",0,0,w,h);
  }

  pdf.save("images.pdf");
};

</script>

</body>
</html>
