<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF ⇄ Image Converter</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fafafa;
  text-align:center;
  padding:20px;
}

.card{
  background:white;
  max-width:420px;
  margin:10px auto;
  padding:18px;
  border-radius:16px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff8fab;
  color:white;
}

button:active{
  transform:scale(0.97);
}

img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

.notice{
  font-size:12px;
  color:#777;
}
</style>

</head>

<body>

<h2>PDF ⇄ Image Converter</h2>

<!-- PDF→画像 -->
<div class="card">
  <h3>PDF → 画像</h3>

  <input type="file" id="pdfInput" accept="application/pdf">

  <button id="pdfConvert">変換</button>
  <button id="downloadImages">画像ダウンロード</button>
  <button id="zipDownload">ZIPダウンロード</button>

  <p class="notice" id="status">PDFを選択してください</p>
</div>

<!-- 画像→PDF -->
<div class="card">
  <h3>画像 → PDF</h3>

  <input type="file" id="imgInput" accept="image/*" multiple>

  <button id="imgToPdf">PDFに変換</button>

  <p class="notice">PDFはファイルアプリに保存されます</p>
</div>

<!-- プレビュー -->
<div class="card">
  <h3>プレビュー</h3>
  <div id="preview"></div>
</div>

<!-- ライブラリ（順番超重要） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/* =====================
   PDF.js worker設定（必須）
===================== */
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

/* =====================
   グローバル
===================== */
let images = [];
const preview = document.getElementById("preview");
const status = document.getElementById("status");

/* =====================
   PDF → 画像変換
===================== */
document.getElementById("pdfConvert").onclick = async () => {

  const file = document.getElementById("pdfInput").files[0];
  if (!file) return alert("PDFを選んでください");

  try {

    images = [];
    preview.innerHTML = "";
    status.textContent = "変換中…";

    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    for (let i = 1; i <= pdf.numPages; i++) {

      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({ canvasContext: ctx, viewport }).promise;

      const img = canvas.toDataURL("image/jpeg");

      images.push(img);

      const el = document.createElement("img");
      el.src = img;
      preview.appendChild(el);
    }

    status.textContent = "変換完了 ✔";

  } catch (e) {
    console.log(e);
    status.textContent = "エラーが発生しました";
  }
};

/* =====================
   画像ダウンロード（iPhone対応）
===================== */
document.getElementById("downloadImages").onclick = () => {

  if (!images.length) return alert("先に変換してください");

  images.forEach((img, i) => {

    const a = document.createElement("a");
    a.href = img;
    a.download = `page-${i + 1}.jpg`;

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  status.textContent = "保存ダイアログを開きました";
};

/* =====================
   ZIPダウンロード
===================== */
document.getElementById("zipDownload").onclick = async () => {

  if (!images.length) return alert("先に変換してください");

  const zip = new JSZip();

  images.forEach((img, i) => {
    zip.file(`page-${i + 1}.jpg`, img.split(",")[1], { base64: true });
  });

  const blob = await zip.generateAsync({ type: "blob" });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "images.zip";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
};

/* =====================
   画像 → PDF
===================== */
document.getElementById("imgToPdf").onclick = async () => {

  const files = document.getElementById("imgInput").files;
  if (!files.length) return alert("画像を選んでください");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  for (let i = 0; i < files.length; i++) {

    const data = await new Promise(r => {
      const reader = new FileReader();
      reader.onload = e => r(e.target.result);
      reader.readAsDataURL(files[i]);
    });

    const img = new Image();
    img.src = data;

    await new Promise(r => (img.onload = r));

    const w = pdf.internal.pageSize.getWidth();
    const h = (img.height / img.width) * w;

    if (i !== 0) pdf.addPage();

    pdf.addImage(img, "JPEG", 0, 0, w, h);
  }

  pdf.save("images.pdf");
};

</script>

</body>
</html>
