<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>picoConverter</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fafafa;
  text-align: center;
  padding: 20px;
  color: #333;
}

.tabs {
  display: flex;
  max-width: 360px;
  margin: 0 auto 15px;
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 12px rgba(255,182,193,0.15);
}

.tab {
  flex: 1;
  padding: 12px;
  cursor: pointer;
}

.tab.active {
  background: #ff8fab;
  color: white;
}

.card {
  background: white;
  max-width: 360px;
  margin: 10px auto;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 4px 12px rgba(255,182,193,0.15);
}

.drop {
  border: 2px dashed #ff8fab;
  padding: 15px;
  border-radius: 14px;
  cursor: pointer;
}

.drop.dragover {
  background: #ffe4ec;
}

.drop input {
  display: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 14px;
  background: #ff8fab;
  color: white;
}

button:active {
  transform: scale(0.95);
}

#preview img {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<h2>picoConverter</h2>

<div class="tabs">
  <div class="tab active" onclick="showTab('pdf')">PDF→画像</div>
  <div class="tab" onclick="showTab('img')">画像→PDF</div>
</div>

<!-- PDF TAB -->
<div id="pdfTab">

  <div class="card">

    <div class="drop" id="dropArea">
      <p>PDFをドラッグ or タップ</p>
      <input type="file" id="pdfFile" accept="application/pdf">
    </div>

    <button id="convert">変換</button>
    <button id="download">画像DL</button>
    <button id="zip">ZIP DL</button>

  </div>

</div>

<!-- IMG TAB -->
<div id="imgTab" style="display:none;">

  <div class="card">
    <input type="file" id="imgFile" accept="image/*" multiple>
    <button id="toPdf">PDFにする</button>
  </div>

</div>

<!-- PREVIEW -->
<div class="card">
  <h3>プレビュー</h3>
  <div id="preview"></div>
</div>

<!-- LIBS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

let images = [];
const preview = document.getElementById("preview");
const pdfFile = document.getElementById("pdfFile");
const drop = document.getElementById("dropArea");

/* =====================
   TAB
===================== */
function showTab(tab){
  document.getElementById("pdfTab").style.display = tab==="pdf"?"block":"none";
  document.getElementById("imgTab").style.display = tab==="img"?"block":"none";
}

/* =====================
   DROP
===================== */
drop.onclick = ()=>pdfFile.click();

drop.addEventListener("dragover", e=>{
  e.preventDefault();
  drop.classList.add("dragover");
});

drop.addEventListener("dragleave", ()=>{
  drop.classList.remove("dragover");
});

drop.addEventListener("drop", e=>{
  e.preventDefault();
  drop.classList.remove("dragover");
  pdfFile.files = e.dataTransfer.files;
});

/* =====================
   PDF → IMAGE + PREVIEW
===================== */
document.getElementById("convert").onclick = async ()=>{

  const file = pdfFile.files[0];
  if(!file) return alert("PDFを選んで");

  preview.innerHTML = "";
  images = [];

  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  for(let i=1;i<=pdf.numPages;i++){

    const page = await pdf.getPage(i);
    const viewport = page.getViewport({scale:2});

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({canvasContext:ctx,viewport}).promise;

    const img = canvas.toDataURL("image/jpeg");

    images.push(img);

    const el = document.createElement("img");
    el.src = img;
    preview.appendChild(el);
  }
};

/* =====================
   DOWNLOAD JPG
===================== */
document.getElementById("download").onclick = ()=>{

  if(!images.length) return alert("先に変換してね");

  images.forEach((img,i)=>{
    const a=document.createElement("a");
    a.href=img;
    a.download=`page-${i+1}.jpg`;
    document.body.appendChild(a);
    a.click();
    a.remove();
  });
};

/* =====================
   ZIP DOWNLOAD (FIXED)
===================== */
document.getElementById("zip").onclick = async ()=>{

  if(!images.length) return alert("先に変換してね");

  const zip = new JSZip();

  images.forEach((img,i)=>{
    const base64 = img.split(",")[1];
    zip.file(`page-${i+1}.jpg`, base64, {base64:true});
  });

  const blob = await zip.generateAsync({type:"blob"});

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "images.zip";
  document.body.appendChild(a);
  a.click();
  a.remove();
};

/* =====================
   IMAGE → PDF (FIXED)
===================== */
document.getElementById("toPdf").onclick = async ()=>{

  const files = document.getElementById("imgFile").files;
  if(!files.length) return alert("画像を選んで");

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  for(let i=0;i<files.length;i++){

    const data = await new Promise(r=>{
      const f=new FileReader();
      f.onload=e=>r(e.target.result);
      f.readAsDataURL(files[i]);
    });

    const img=new Image();
    img.src=data;

    await new Promise(r=>img.onload=r);

    const w=pdf.internal.pageSize.getWidth();
    const h=(img.height/img.width)*w;

    if(i!==0) pdf.addPage();

    pdf.addImage(img,"JPEG",0,0,w,h);
  }

  pdf.save("images.pdf");
};

</script>

</body>
</html>
