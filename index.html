<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="PDFを画像に変換、画像をPDFに変換できる無料ツール。iPhone・PC対応、インストール不要。">
  <title>PDF画像変換ツール|無料で画像とPDFを相互変換</title>
<h1>PDFと画像を簡単に変換できる無料ツール</h1>
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fafafa;
  text-align:center;
  padding:20px;
  color:#333;
}

.tabs{
  display:flex;
  max-width:420px;
  margin:0 auto 15px;
  background:white;
  border-radius:14px;
  overflow:hidden;
}

.tab{
  flex:1;
  padding:12px;
  cursor:pointer;
}

.tab.active{
  background:#ff8fab;
  color:white;
}

.card{
  background:white;
  max-width:420px;
  margin:10px auto;
  padding:18px;
  border-radius:16px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff8fab;
  color:white;
}

button:active{
  transform:scale(0.97);
}

#preview img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<h2>PDF画像相互変換ツール</h2>

<!-- タブ -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('pdf2img')">PDF → 画像</div>
  <div class="tab" onclick="switchTab('img2pdf')">画像 → PDF</div>
</div>

<!-- PDF → 画像 -->
<div id="pdf2img" class="card">

  <h3>PDF → 画像</h3>

  <input type="file" id="pdfFile" accept="application/pdf">

  <button id="convertPdf">変換</button>
  <button id="saveImgs">保存先を選んで保存</button>

</div>

<!-- 画像 → PDF -->
<div id="img2pdf" class="card" style="display:none;">

  <h3>画像 → PDF</h3>

  <input type="file" id="imgFile" accept="image/*" multiple>

  <button id="convertImg">PDF作成 & 保存</button>

  <div id="preview"></div>

</div>

<!-- ライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let images=[];
const preview=document.getElementById("preview");

/* =====================
   タブ切替
===================== */
function switchTab(tab){

  document.getElementById("pdf2img").style.display = tab==="pdf2img"?"block":"none";
  document.getElementById("img2pdf").style.display = tab==="img2pdf"?"block":"none";

  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", i === (tab==="pdf2img"?0:1));
  });
}

/* =====================
   PDF → 画像
===================== */
document.getElementById("convertPdf").onclick = async ()=>{

  const file=document.getElementById("pdfFile").files[0];
  if(!file) return alert("PDFを選んでください");

  images=[];

  const buffer=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buffer}).promise;

  for(let i=1;i<=pdf.numPages;i++){

    const page=await pdf.getPage(i);
    const viewport=page.getViewport({scale:2});

    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");

    canvas.width=viewport.width;
    canvas.height=viewport.height;

    await page.render({canvasContext:ctx,viewport}).promise;

    images.push(canvas.toDataURL("image/jpeg"));
  }

  alert("変換完了");
};

/* =====================
   保存（保存先選択対応）
===================== */
async function saveWithPicker(blob, filename){

  // Chrome / Edge（本物の保存先選択）
  if(window.showSaveFilePicker){

    const handle = await showSaveFilePicker({
      suggestedName: filename,
      types:[{
        description:"file",
        accept:{"application/octet-stream":[".jpg",".pdf"]}
      }]
    });

    const writable = await handle.createWritable();
    await writable.write(blob);
    await writable.close();

    return;
  }

  // iPhone（ファイルアプリ）
  const file = new File([blob], filename, {type:blob.type});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({files:[file]});
    return;
  }

  // fallback
  const url = URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=filename;

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

/* =====================
   PDF → 画像保存
===================== */
document.getElementById("saveImgs").onclick = async ()=>{

  if(!images.length) return alert("先に変換してください");

  for(let i=0;i<images.length;i++){

    const res=await fetch(images[i]);
    const blob=await res.blob();

    await saveWithPicker(blob,`page-${i+1}.jpg`);
  }
};

/* =====================
   画像 → PDF
===================== */
document.getElementById("convertImg").onclick = async ()=>{

  const files=document.getElementById("imgFile").files;
  if(!files.length) return alert("画像を選んでください");

  preview.innerHTML="";

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  for(let i=0;i<files.length;i++){

    const data=await new Promise(r=>{
      const fr=new FileReader();
      fr.onload=e=>r(e.target.result);
      fr.readAsDataURL(files[i]);
    });

    const img=new Image();
    img.src=data;

    await new Promise(r=>img.onload=r);

    const el=document.createElement("img");
    el.src=data;
    preview.appendChild(el);

    const w=pdf.internal.pageSize.getWidth();
    const h=(img.height/img.width)*w;

    if(i!==0) pdf.addPage();

    pdf.addImage(img,"JPEG",0,0,w,h);
  }

  const blob = pdf.output("blob");

  await saveWithPicker(blob,"converted.pdf");
};

</script>

</body>
</html>
