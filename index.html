<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>picoConverter</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fafafa;
  text-align: center;
  padding: 20px 12px;
  color: #333;
}

/* タブ */
.tabs {
  display: flex;
  max-width: 360px;
  margin: 0 auto 15px;
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 12px rgba(255,182,193,0.15);
}

.tab {
  flex: 1;
  padding: 12px;
  cursor: pointer;
  transition: 0.2s;
  background: white;
}

.tab.active {
  background: #ff8fab;
  color: white;
}

/* カード */
.card {
  background: white;
  max-width: 360px;
  margin: 10px auto;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 4px 12px rgba(255,182,193,0.15);
}

/* ボタン */
button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 14px;
  background: #ff8fab;
  color: white;
  cursor: pointer;
}

button:active {
  transform: scale(0.95);
}

/* ドロップ */
.drop {
  border: 2px dashed #ff8fab;
  padding: 18px;
  border-radius: 14px;
  cursor: pointer;
}

.drop.dragover {
  background: #ffe4ec;
}

.drop input {
  display: none;
}

/* プレビュー */
#preview img {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<h2>picoConverter</h2>

<!-- タブ -->
<div class="tabs">
  <div class="tab active" onclick="showTab('pdf')">PDF → 画像</div>
  <div class="tab" onclick="showTab('img')">画像 → PDF</div>
</div>

<!-- PDFタブ -->
<div id="pdfTab">

  <div class="card">

    <div class="drop" id="dropArea">
      <p>PDFをドラッグ or タップ</p>
      <input type="file" id="pdfFile" accept="application/pdf">
    </div>

    <button id="toImg">変換</button>
    <button id="zipBtn" style="display:none;">ZIPダウンロード</button>
    <button id="dlBtn" style="display:none;">通常ダウンロード</button>

  </div>

</div>

<!-- 画像タブ -->
<div id="imgTab" style="display:none;">

  <div class="card">
    <input type="file" id="imgFile" accept="image/*" multiple>
    <button id="toPdf">PDFにする</button>
  </div>

</div>

<!-- プレビュー -->
<div class="card">
  <h3>プレビュー</h3>
  <div id="preview"></div>
</div>

<!-- ライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const pdfFile = document.getElementById("pdfFile");
const drop = document.getElementById("dropArea");
const preview = document.getElementById("preview");

let images = [];

/* =====================
   タブ切替
===================== */
function showTab(tab) {

  document.getElementById("pdfTab").style.display = tab === "pdf" ? "block" : "none";
  document.getElementById("imgTab").style.display = tab === "img" ? "block" : "none";

  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", i === (tab === "pdf" ? 0 : 1));
  });
}

/* =====================
   ドロップ
===================== */
drop.addEventListener("click", ()=> pdfFile.click());

drop.addEventListener("dragover", e=>{
  e.preventDefault();
  drop.classList.add("dragover");
});

drop.addEventListener("dragleave", ()=>{
  drop.classList.remove("dragover");
});

drop.addEventListener("drop", e=>{
  e.preventDefault();
  drop.classList.remove("dragover");
  pdfFile.files = e.dataTransfer.files;
});

/* =====================
   PDF → 画像
===================== */
document.getElementById("toImg").onclick = async () => {

  const file = pdfFile.files[0];
  if (!file) return alert("PDFを選んでください");

  preview.innerHTML = "";
  images = [];

  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buffer}).promise;

  for (let i=1;i<=pdf.numPages;i++){

    const page = await pdf.getPage(i);
    const viewport = page.getViewport({scale:2});

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({canvasContext:ctx,viewport}).promise;

    const img = canvas.toDataURL("image/jpeg");

    const el = document.createElement("img");
    el.src = img;
    preview.appendChild(el);

    images.push(img);
  }

  document.getElementById("zipBtn").style.display="block";
  document.getElementById("dlBtn").style.display="block";
};

/* =====================
   通常DL
===================== */
document.getElementById("dlBtn").onclick = ()=>{
  images.forEach((img,i)=>{
    const a=document.createElement("a");
    a.href=img;
    a.download=`page-${i+1}.jpg`;
    a.click();
  });
};

/* =====================
   ZIP DL
===================== */
document.getElementById("zipBtn").onclick = async ()=>{

  const zip = new JSZip();

  images.forEach((img,i)=>{
    zip.file(`page-${i+1}.jpg`, img.split(",")[1], {base64:true});
  });

  const blob = await zip.generateAsync({type:"blob"});

  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="images.zip";
  a.click();
};

/* =====================
   画像 → PDF
===================== */
document.getElementById("toPdf").onclick = async ()=>{

  const files = document.getElementById("imgFile").files;
  if(!files.length) return alert("画像を選んでください");

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  for(let i=0;i<files.length;i++){

    const data=await new Promise(r=>{
      const f=new FileReader();
      f.onload=e=>r(e.target.result);
      f.readAsDataURL(files[i]);
    });

    const img=new Image();
    img.src=data;

    await new Promise(r=>img.onload=r);

    const w=pdf.internal.pageSize.getWidth();
    const h=(img.height/img.width)*w;

    if(i!==0)pdf.addPage();

    pdf.addImage(img,"JPEG",0,0,w,h);
  }

  pdf.save("images.pdf");
};
</script>

</body>
</html>
